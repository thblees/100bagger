name: Refresh Screener Data

on:
  schedule:
    # Runs at 03:00 UTC on the 1st of every month.
    # Cron format: minute hour day-of-month month day-of-week
    - cron: '0 3 1 * *'
  workflow_dispatch:  # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5h ceiling; pipeline typically runs ~3.5h
    permissions:
      contents: write  # required to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        run: python pipeline/run_pipeline.py

      - name: Show pipeline log tail
        if: always()
        run: tail -50 pipeline/pipeline_log.txt || echo "no log"

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes in data.json — nothing to commit."
          else
            git commit -m "data: monthly pipeline refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
